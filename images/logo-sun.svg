<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- 太阳光线 (8条放射状) -->
  <g fill="url(#sunGrad)">
    <!-- 顶部光线 -->
    <ellipse cx="100" cy="20" rx="10" ry="22"/>
    <!-- 右上光线 -->
    <ellipse cx="158" cy="42" rx="10" ry="22" transform="rotate(45 158 42)"/>
    <!-- 右侧光线 -->
    <ellipse cx="180" cy="100" rx="10" ry="22" transform="rotate(90 180 100)"/>
    <!-- 右下光线 -->
    <ellipse cx="158" cy="158" rx="10" ry="22" transform="rotate(135 158 158)"/>
    <!-- 左下光线 -->
    <ellipse cx="42" cy="158" rx="10" ry="22" transform="rotate(45 42 158)"/>
    <!-- 左侧光线 -->
    <ellipse cx="20" cy="100" rx="10" ry="22" transform="rotate(90 20 100)"/>
    <!-- 左上光线 -->
    <ellipse cx="42" cy="42" rx="10" ry="22" transform="rotate(-45 42 42)"/>
  </g>

  <!-- 太阳主体 -->
  <circle cx="100" cy="90" r="40" fill="url(#sunGrad)"/>
  <!-- 太阳高光 -->
  <ellipse cx="85" cy="75" rx="12" ry="8" fill="#fef3c7" opacity="0.6"/>

  <!-- 蓝色波浪/丝带 (Z形) -->
  <path d="M 30 130
           Q 70 110, 100 130
           T 170 130
           L 170 145
           Q 130 165, 100 145
           T 30 145
           Z"
        fill="url(#waveGrad)"/>

  <path d="M 40 155
           Q 80 135, 110 155
           T 175 155
           L 175 170
           Q 135 190, 105 170
           T 40 170
           Z"
        fill="url(#waveGrad)"/>
</svg>
