<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- 圆形背景渐变（淡黄） -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="40" fill="url(#bg)" stroke="#ffffff" stroke-width="1"/>

  <!-- 橙色帽子顶部 -->
  <ellipse cx="40" cy="22" rx="18" ry="9" fill="#f97316"/>
  <!-- 帽子帽檐 -->
  <ellipse cx="40" cy="28" rx="20" ry="5" fill="#ea580c"/>
  <!-- 帽子帽带 -->
  <rect x="22" y="30" width="36" height="3" fill="#fb923c"/>

  <!-- 头发（黑色，刘海） -->
  <path d="M22 32 Q22 36 24 38 L 56 38 Q58 36 58 32 L 58 36 Q40 32 22 36 Z" fill="#1f2937"/>

  <!-- 脸部（肤色） -->
  <circle cx="40" cy="42" r="12" fill="#fcd9b6"/>

  <!-- 眼睛 -->
  <circle cx="35" cy="42" r="1.5" fill="#1f2937"/>
  <circle cx="45" cy="42" r="1.5" fill="#1f2937"/>

  <!-- 嘴巴（微笑） -->
  <path d="M36 47 Q40 50 44 47" stroke="#1f2937" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- 红脸蛋 -->
  <circle cx="30" cy="45" r="2" fill="#fb7185" opacity="0.5"/>
  <circle cx="50" cy="45" r="2" fill="#fb7185" opacity="0.5"/>

  <!-- 身体/衬衫（蓝色） -->
  <path d="M18 70c0-8 8-12 22-12s22 4 22 12v10H18z" fill="#3b82f6"/>
  <!-- 衣领 -->
  <path d="M32 60 L40 68 L48 60 Z" fill="#1e40af"/>
  <!-- 衬衫纽扣 -->
  <circle cx="40" cy="70" r="1" fill="#fbbf24"/>
  <circle cx="40" cy="75" r="1" fill="#fbbf24"/>
</svg>
